  Przelewy24\Tabs\Tab\OrderTab:
    class: Przelewy24\Tabs\Tab\OrderTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\InstallmentsTab:
    class: Przelewy24\Tabs\Tab\InstallmentsTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\PaymentTab:
    class: Przelewy24\Tabs\Tab\PaymentTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\ApplePayTab:
    class: Przelewy24\Tabs\Tab\ApplePayTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\BlikTab:
    class: Przelewy24\Tabs\Tab\BlikTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\CardsTab:
    class: Przelewy24\Tabs\Tab\CardsTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\GooglePayTab:
    class: Przelewy24\Tabs\Tab\GooglePayTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\StateTab:
    class: Przelewy24\Tabs\Tab\StateTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Tabs\Tab\TimeTab:
    class: Przelewy24\Tabs\Tab\TimeTab
    arguments:
      - '@twig'
      - '@przelewy24.translator'
      - '@Przelewy24\Factory\Form\FormTabFactory'
      - '@Przelewy24\Configuration\Enum\FormTypeEnum'
    tags:
      - przelewy24.tab

  Przelewy24\Factory\Tabs\TabsFactory:
    class: Przelewy24\Factory\Tabs\TabsFactory
    arguments:
      - !tagged przelewy24.tab
      - '@Przelewy24\Tabs\Tabs'

  Przelewy24\Factory\Form\FormTabFactory:
    class: Przelewy24\Factory\Form\FormTabFactory
    arguments:
      - '@form.factory'


  Przelewy24\Configuration\Enum\FormTypeEnum:
    class: Przelewy24\Configuration\Enum\FormTypeEnum
    arguments:
      - '@przelewy24.translator'


  Przelewy24\Form\Transformer\PaymentMethodTransformer:
    class: Przelewy24\Form\Transformer\PaymentMethodTransformer

  Przelewy24\Form\Transformer\CertTransformer:
    class: Przelewy24\Form\Transformer\CertTransformer



  Przelewy24\Transformer\FormDataToRefundOrderTransformer:
    class: Przelewy24\Transformer\FormDataToRefundOrderTransformer

  Przelewy24\Handler\Order\OrderRefundHandler:
    class: Przelewy24\Handler\Order\OrderRefundHandler
    arguments:
      - '@Przelewy24\Provider\Refund\RefundProvider'
      - '@Przelewy24\Refund\RefundTransaction'
      - '@Przelewy24\Factory\Transaction\TransactionScopeFactory'

  Przelewy24\Event\Adapter\EventDispatcher:
    class: Przelewy24\Event\Adapter\EventDispatcher
    arguments:
      - '@event_dispatcher'

  Przelewy24\Subscriber\ConfigSaveEventSubscriber:
    class: Przelewy24\Subscriber\ConfigSaveEventSubscriber
    tags:
      - { name: kernel.event_subscriber }

  Przelewy24\Presenter\Order\Przelewy24OrderPresenter:
    class: Przelewy24\Presenter\Order\Przelewy24OrderPresenter
    arguments:
      - '@Przelewy24\Renderer\Przelewy24OrderRenderer'
      - '@Przelewy24\Transformer\ModelToTransactionHistoryCollectionTransformer'
      - '@Przelewy24\Factory\Form\RefundFormFactory'
      - '@Przelewy24\Helper\Url\UrlHelper'
      - '@Przelewy24\Helper\Price\PriceHelper'

  Przelewy24\Renderer\Przelewy24OrderRenderer:
    class: Przelewy24\Renderer\Przelewy24OrderRenderer
    arguments:
      - '@Przelewy24\Renderer\Przelewy24RefundFormRenderer'
      - '@Przelewy24\Renderer\Przelewy24HistoryPaymentRenderer'
      - '@?twig'

  Przelewy24\Renderer\Przelewy24RefundFormRenderer:
    class: Przelewy24\Renderer\Przelewy24RefundFormRenderer
    arguments:
      - '@?twig'

  Przelewy24\Renderer\Przelewy24HistoryPaymentRenderer:
    class: Przelewy24\Renderer\Przelewy24HistoryPaymentRenderer
    arguments:
      - '@?twig'

  Przelewy24\Factory\Form\RefundFormFactory:
    class: Przelewy24\Factory\Form\RefundFormFactory
    arguments:
      - '@?form.factory'

  Przelewy24\Hook\DisplayAdminOrder:
    class: Przelewy24\Hook\DisplayAdminOrder
    tags: [ przelewy24.hook ]
    arguments:
      - '@Przelewy24\Presenter\Order\Przelewy24OrderPresenter'












